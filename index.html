<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美容室CLanからの挑戦状</title>
  <style>
    /* =========================================
       モノクロ設定 & イラスト背景最適化
       ========================================= */
    :root {
      /* デフォルト: ライト */
      --bg-color: #fcfcfc;
      --panel-bg: rgba(255, 255, 255, 0.92);
      --text-color: #222222;
      --sub-text-color: #666666;
      --border-color: #333333;
      --hover-bg: rgba(0, 0, 0, 0.05);
    }

    body[data-theme="dark"] {
      --bg-color: #121212;
      --panel-bg: rgba(30, 30, 30, 0.92);
      --text-color: #ffffff;
      --sub-text-color: #aaaaaa;
      --border-color: #cccccc;
      --hover-bg: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      /* 背景画像のパス（ファイル名）を指定してください */
      background-image: url("title-bg.gif"); 
      background-size: contain;
      background-position: center top;
      background-repeat: no-repeat;
      
      color: var(--text-color);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s, color 0.2s;
      position: relative;
    }

    /* --- 外枠（container）の設定 --- */
    .container {
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
      border: 2px solid var(--border-color); /* 四角い外枠を残す */
      border-radius: 8px;
      padding: 24px;
      transition: background-color 0.3s;
    }

    /* タイトル画面表示中：外枠だけ残して中身は透明に */
    body:has(#screen-title.active) .container {
      background: transparent;
      box-shadow: none;
    }

    /* セレクト画面表示中：文字が読みやすいよう背景を表示 */
    body:has(#screen-select.active) .container {
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    /* --- 右上設定ボタン --- */
    .settings-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #ccc;
      border-radius: 50%;
      color: #333;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.3s ease, background 0.2s;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    body[data-theme="dark"] .settings-btn {
      background: rgba(30, 30, 30, 0.8);
      border-color: #555;
      color: #fff;
    }

    .settings-btn:hover {
      transform: rotate(60deg);
    }

    .settings-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* 画面切り替えアニメーション */
    .screen {
      display: none;
      animation: fadeIn 0.25s ease-in-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- 1. タイトル画面 --- */
    #screen-title {
      text-align: center;
      padding-top: 50vh; /* イラスト下のスペースに調整 */
      padding-bottom: 20px;
    }

    .start-btn {
      display: inline-block;
      background: #222222;
      color: #ffffff;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 16px 40px;
      border: 2px solid #222222;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 2px;
      animation: blink 1.2s infinite;
      transition: all 0.2s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    body[data-theme="dark"] .start-btn {
      background: #ffffff;
      color: #111111;
      border-color: #ffffff;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* --- 2. ゲーム選択画面 --- */
    h2 {
      text-align: center;
      margin-bottom: 24px;
      color: var(--text-color);
      letter-spacing: 2px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .game-card {
      background: rgba(0, 0, 0, 0.03);
      border: 2px solid var(--border-color);
      border-radius: 6px;
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s, transform 0.1s;
    }

    body[data-theme="dark"] .game-card {
      background: rgba(255, 255, 255, 0.03);
    }

    .game-card:hover:not(.locked) {
      border-color: var(--text-color);
      background: var(--hover-bg);
      transform: translateY(-2px);
    }

    .game-card.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .game-card .icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .game-card .name {
      font-weight: bold;
      font-size: 0.85rem;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .game-card .tag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 6px;
      border: 1px solid var(--border-color);
      color: var(--sub-text-color);
      border-radius: 2px;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .back-btn:hover {
      background: var(--hover-bg);
    }

    /* --- 設定モーダル --- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s ease-in-out;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      width: 90%;
      max-width: 360px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .modal-header h3 {
      color: var(--text-color);
      font-size: 1.1rem;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-color);
      font-size: 1.4rem;
      cursor: pointer;
      opacity: 0.6;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .setting-item select {
      padding: 4px 8px;
      background: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
    }

    .danger-zone {
      margin-top: 24px;
      padding: 10px 14px;
      border: 1px dashed var(--border-color);
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .danger-zone:hover {
      background: var(--hover-bg);
    }

    .danger-zone .label {
      color: var(--text-color);
      font-weight: bold;
      font-size: 0.85rem;
    }

    .danger-zone .desc {
      font-size: 0.7rem;
      color: var(--sub-text-color);
      margin-top: 2px;
    }

    /* レトロ走査線エフェクト */
    #crt-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 999;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%);
      background-size: 100% 4px;
    }
  </style>
</head>
<body>

  <!-- 右上設定ボタン -->
  <button class="settings-btn" onclick="toggleModal(true)" title="設定" aria-label="設定">
    <svg viewBox="0 0 24 24">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6-3.6z"/>
    </svg>
  </button>

  <main class="container">
    <!-- 1. タイトル画面 -->
    <section id="screen-title" class="screen active">
      <button class="start-btn" onclick="showScreen('select')">PUSH START</button>
    </section>

    <!-- 2. ゲーム選択画面 -->
    <section id="screen-select" class="screen">
      <h2>SELECT GAME</h2>
      
      <!-- ゲーム一覧カード -->
      <div id="game-grid" class="game-grid"></div>

      <!-- タイトルへ戻るボタン -->
      <div style="margin-top: 10px; text-align: center;">
        <button class="back-btn" onclick="showScreen('title')">‹ TITLE BACK</button>
      </div>
    </section>
  </main>

  <!-- 設定モーダル画面 -->
  <div id="settings-modal" class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-content">
      <div class="modal-header">
        <h3>SETTINGS</h3>
        <button class="close-btn" onclick="toggleModal(false)">×</button>
      </div>

      <div class="setting-item">
        <label for="setting-theme">テーマ</label>
        <select id="setting-theme" onchange="saveSettings()">
          <option value="light">ライト (Light)</option>
          <option value="dark">ダーク (Dark)</option>
        </select>
      </div>

      <!-- データ全削除ボタン -->
      <div class="danger-zone" onclick="resetAllData()">
        <div>
          <div class="label">全セーブデータを削除</div>
          <div class="desc">この操作は取り消せません</div>
        </div>
        <span>›</span>
      </div>
    </div>
  </div>

  <div id="crt-overlay"></div>

  <script>
    const GAMES = [
      { id: "sudoku",  name: "高速ナンプレ",           icon: "🔢", tag: "PUZZLE", url: "sudoku.html", locked: false },
      { id: "maze",    name: "イライラ迷路",           icon: "🌀", tag: "ACTION", url: "maze.html",   locked: true },
      { id: "mines",   name: "マインダンジョンスイーパー", icon: "💣", tag: "PUZZLE", url: "mines.html",  locked: true },
      { id: "next",    name: "今後追加予定",           icon: "❓", tag: "COMING SOON", url: null,     locked: true },
    ];

    const SETTINGS_KEY = "clanhair.settings";

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById('screen-' + name);
      if (target) {
        target.classList.add('active');
      }
    }

    function toggleModal(show) {
      const modal = document.getElementById('settings-modal');
      if (show) {
        modal.classList.add('active');
      } else {
        modal.classList.remove('active');
      }
    }

    function handleOverlayClick(event) {
      if (event.target.id === 'settings-modal') {
        toggleModal(false);
      }
    }

    function renderGameGrid() {
      const grid = document.getElementById('game-grid');
      if (!grid) return;

      grid.innerHTML = "";
      GAMES.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card' + (g.locked ? ' locked' : '');
        card.innerHTML = `
          <div class="icon">${g.icon}</div>
          <div class="name">${g.name}</div>
          <div class="tag">${g.tag}</div>
        `;

        if (!g.locked) {
          card.onclick = () => { location.href = g.url; };
        }
        grid.appendChild(card);
      });
    }

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
    }

    function saveSettings() {
      const theme = document.getElementById('setting-theme').value;
      applyTheme(theme);

      const settings = {
        theme: theme,
      };

      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function loadSettings() {
      const raw = localStorage.getItem(SETTINGS_KEY);
      const s = raw ? JSON.parse(raw) : {};

      try {
        document.getElementById('setting-theme').value = s.theme ?? 'light';
        applyTheme(s.theme ?? 'light');
      } catch (e) {
        console.error("設定読み込みエラー:", e);
      }
    }

    function resetAllData() {
      if (confirm("すべてのセーブデータを削除します。よろしいですか？")) {
        localStorage.clear();
        loadSettings();
        toggleModal(false);
        alert("削除しました。");
      }
    }

    renderGameGrid();
    loadSettings();
  </script>
</body>
</html>
