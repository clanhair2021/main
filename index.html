<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイ・アーケード</title>
  <style>
    /* お手元のCSS（元のデザイン設定）をそのままここに残してお使いください */
  </style>
</head>
<body>

  <div id="screen-title" class="screen active">
    </div>

  <section class="settings-panel">
    <div class="setting-item">
      <span>テーマ設定</span>
      <select id="setting-theme" onchange="saveSettings()">
        <option value="dark">ダークモード</option>
        <option value="light">ライトモード</option>
      </select>
    </div>

    <div class="setting-item">
      <span>効果音</span>
      <input type="checkbox" id="setting-sound" onchange="saveSettings()" checked>
    </div>

    <div class="setting-item">
      <span>音量</span>
      <input type="range" id="setting-volume" min="0" max="100" value="70" onchange="saveSettings()">
    </div>

    <div class="danger-zone" onclick="resetAllData()">
      <div>
        <div class="label">全ゲームのセーブデータを削除</div>
        <div class="desc">この操作は取り消せません</div>
      </div>
      <span>&rsaquo;</span>
    </div>
  </section>

  <div id="crt-overlay">
    <div class="crt-vignette"></div>
    <div class="crt-scan"></div>
    <div class="crt-roll"></div>
  </div>

  <script>
    // ==========================================
    // 1. ゲーム一覧
    // ==========================================
    const GAMES = [
      { id:"sudoku",  name:"モダン・ナンプレ", icon:"🔢", tag:"PUZZLE", url:"sudoku.html", locked:false },
      { id:"maze",    name:"迷路ゲーム",       icon:"🌀", tag:"準備中", url:null, locked:true },
      { id:"picross", name:"イラストロジック", icon:"🧩", tag:"準備中", url:null, locked:true },
    ];

    // ==========================================
    // 2. 画面切り替え（元の関数をそのまま維持）
    // ==========================================
    function showScreen(name){
      const screens = document.querySelectorAll('.screen');
      if (screens.length > 0) {
        screens.forEach(s => s.classList.remove('active'));
      }
      const targetScreen = document.getElementById('screen-' + name);
      if (targetScreen) {
        targetScreen.classList.add('active');
      }
      document.body.classList.toggle('on-title', name === 'title');
    }

    // ==========================================
    // 3. テーマ適用
    // ==========================================
    function applyTheme(theme){
      document.body.dataset.theme = theme || 'dark';
    }

    // ==========================================
    // 4. 設定の保存と読み込み
    // ==========================================
    const SETTINGS_KEY = "clanhair.settings";

    function saveSettings(){
      const themeSelect = document.getElementById('setting-theme');
      const soundCheck = document.getElementById('setting-sound');
      const volumeSlider = document.getElementById('setting-volume');

      const theme = themeSelect ? themeSelect.value : 'dark';
      const sound = soundCheck ? soundCheck.checked : true;
      const volume = volumeSlider ? volumeSlider.value : 70;

      applyTheme(theme);

      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        sound: sound,
        volume: volume,
        theme: theme,
      }));
    }

    function loadSettings(){
      const raw = localStorage.getItem(SETTINGS_KEY);
      const s = raw ? JSON.parse(raw) : {};
      
      const theme = s.theme ?? 'dark';
      applyTheme(theme);

      const themeSelect = document.getElementById('setting-theme');
      if (themeSelect) themeSelect.value = theme;

      const soundCheck = document.getElementById('setting-sound');
      if (soundCheck) soundCheck.checked = s.sound ?? true;

      const volumeSlider = document.getElementById('setting-volume');
      if (volumeSlider) volumeSlider.value = s.volume ?? 70;
    }

    // ==========================================
    // 5. データの一括リセット（バグを防ぐよう改善）
    // ==========================================
    function resetAllData(){
      if(confirm("すべてのゲームのセーブデータと設定を削除します。よろしいですか？\nこの操作は取り消せません。")){
        localStorage.clear();
        alert("すべてのデータを削除しました。");
        window.location.reload(); // 再読み込みして初期設定を再適用
      }
    }

    // ==========================================
    // 6. ゲームカードの生成（元のクラス名 pixel-box などを100%維持）
    // ==========================================
    function renderGameGrid(){
      const grid = document.getElementById('game-grid');
      if (!grid) return;
      
      grid.innerHTML = "";
      GAMES.forEach(g => {
        const card = document.createElement('div');
        // 元のクラス「game-card pixel-box」と「locked」を完全に維持
        card.className = 'game-card pixel-box' + (g.locked ? ' locked' : '');
        card.innerHTML = `
          <div class="icon">${g.icon}</div>
          <div class="name">${g.name}</div>
          <div class="tag">${g.tag}</div>
        `;
        
        if(!g.locked && g.url){ 
          card.onclick = () => { 
            location.href = g.url; 
          }; 
        }
        grid.appendChild(card);
      });
    }

    // ==========================================
    // 7. 起動処理（読み込みタイミングを安全に最適化）
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      loadSettings();
      renderGameGrid();
    });
  </script>
</body>
</html>
