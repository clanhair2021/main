<div>
  <div class="label" onclick="resetAllData()">全ゲームのセーブデータを削除</div>
  <div class="desc">この操作は取り消せません</div>
</div>
<span>›</span>

<div id="crt-overlay">
  <div class="crt-vignette"></div>
  <div class="crt-scan"></div>
  <div class="crt-roll"></div>
</div>

<script>
  // ==========================================
  // 1. ゲーム一覧の設定
  // ==========================================
  // 【改善ポイント】
  // 将来、別のGitHubリポジトリ（別URL）にゲームを作った場合でも、
  // ここに「https://〜」から始まるフルURLをそのまま書けば動くように柔軟に設計しました。
  const GAMES = [
    { id:"sudoku",  name:"モダン・ナンプレ", icon:"🔢", tag:"PUZZLE", url:"sudoku.html", locked:false },
    { id:"maze",    name:"迷路ゲーム",       icon:"🌀", tag:"準備中", url:null, locked:true },
    { id:"picross", name:"イラストロジック", icon:"🧩", tag:"準備中", url:null, locked:true },
  ];

  // ==========================================
  // 2. テーマ適用
  // ==========================================
  function applyTheme(theme){
    document.body.dataset.theme = theme || 'dark';
  }

  // ==========================================
  // 3. 設定・データの保存と読み込み
  // ==========================================
  const SETTINGS_KEY = "clanhair.settings";

  // 設定を保存する
  function saveSettings(){
    const themeSelect = document.getElementById('setting-theme');
    const soundCheck = document.getElementById('setting-sound');
    const volumeSlider = document.getElementById('setting-volume');

    // 要素が存在する場合のみ値を取得（エラー防止）
    const theme = themeSelect ? themeSelect.value : 'dark';
    const sound = soundCheck ? soundCheck.checked : true;
    const volume = volumeSlider ? volumeSlider.value : 70;

    applyTheme(theme);

    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      sound: sound,
      volume: volume,
      theme: theme,
    }));
  }

  // 設定を読み込む
  function loadSettings(){
    const raw = localStorage.getItem(SETTINGS_KEY);
    const s = raw ? JSON.parse(raw) : {};
    
    // 初回起動時やデータが空の場合のデフォルト値を設定
    const theme = s.theme ?? 'dark';
    applyTheme(theme);

    // 画面に設定値を反映（要素が存在するかチェックしてエラーを防ぐ）
    const themeSelect = document.getElementById('setting-theme');
    if (themeSelect) themeSelect.value = theme;

    const soundCheck = document.getElementById('setting-sound');
    if (soundCheck) soundCheck.checked = s.sound ?? true;

    const volumeSlider = document.getElementById('setting-volume');
    if (volumeSlider) volumeSlider.value = s.volume ?? 70;
  }

  // ==========================================
  // 4. 全データの削除（重要）
  // ==========================================
  // 【改善ポイント】
  // ローカルストレージを全てクリアし、ページをリロードして初期状態に戻します。
  // これにより、メニューの設定だけでなく、各ゲーム（ナンプレなど）が
  // ローカルストレージに保存していたセーブデータも丸ごと綺麗にリセットされます。
  function resetAllData(){
    if(confirm("すべてのゲームのセーブデータと設定を削除します。よろしいですか？\nこの操作は取り消せません。")){
      localStorage.clear();
      alert("すべてのデータを削除しました。ページを再読み込みします。");
      window.location.reload(); // ページをリロードして初期状態を再適用
    }
  }

  // ==========================================
  // 5. ゲームグリッドの描画
  // ==========================================
  function renderGameGrid(){
    const grid = document.getElementById('game-grid');
    if (!grid) return;
    
    grid.innerHTML = "";
    GAMES.forEach(g => {
      const card = document.createElement('div');
      // lockedクラスの付与条件を整理
      card.className = `game-card pixel-box ${g.locked ? 'locked' : ''}`;
      card.innerHTML = `
        <div class="icon">${g.icon}</div>
        <div class="name">${g.name}</div>
        <div class="tag">${g.tag}</div>
      `;
      
      if(!g.locked && g.url){ 
        card.onclick = () => { 
          location.href = g.url; 
        }; 
      }
      grid.appendChild(card);
    });
  }

  // ==========================================
  // 6. 起動処理
  // ==========================================
  // ページの読み込みが完了した時点で即座にテーマやグリッドを適用（チラつき防止）
  document.addEventListener("DOMContentLoaded", () => {
    loadSettings();
    renderGameGrid();
  });
</script>
