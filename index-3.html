<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美容室CLanからの挑戦状</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

:root{
  --bg-0:#0b0a14;
  --bg-1:#161327;
  --panel:#1d1830;
  --ink:#f4f1ea;
  --ink-dim:#9c96bd;
  --pink:#ff4d94;
  --cyan:#3fe8c8;
  --yellow:#ffcf3f;
  --black:#000000;
  --px:4px;
}
*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; padding:0; }
body{
  background:var(--bg-0);
  color:var(--ink);
  font-family:'DotGothic16', 'MS Gothic', monospace;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* ライトテーマ(タイトル画面は上で固定しているので対象外) */
body[data-theme="light"]{
  --bg-0:#f4f1ea;
  --bg-1:#e6e0d2;
  --panel:#ffffff;
  --ink:#171227;
  --ink-dim:#6b6580;
  --pink:#e0357c;
  --cyan:#0f9c86;
  --yellow:#c99400;
  --black:#171227;
}

/* モノクロテレビテーマ(タイトル画面と同じ配色+CRT演出を全体に) */
body[data-theme="mono"]{
  --bg-0:#050505;
  --bg-1:#0f0f0f;
  --panel:#161616;
  --ink:#eceaea;
  --ink-dim:#7d7d7d;
  --pink:#dcdcdc;
  --cyan:#ffffff;
  --yellow:#bdbdbd;
  --black:#000000;
}

/* ネオンテーマ */
body[data-theme="neon"]{
  --bg-0:#0a0e0a;
  --bg-1:#10150f;
  --panel:#0f1410;
  --ink:#e0e0e0;
  --ink-dim:#5a5a5a;
  --pink:#ff00ff;
  --cyan:#00ccff;
  --yellow:#ffaa00;
  --black:#000000;
}
body[data-theme="neon"]::before{
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,0,255,.14) 0, transparent 40%),
    radial-gradient(circle at 80% 85%, rgba(0,204,255,.14) 0, transparent 40%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 1px, transparent 1px, transparent 3px);
}
/* ネオンらしいグロー(発光)を各パーツに追加 */
body[data-theme="neon"] .pixel-box{ box-shadow:0 0 0 4px var(--cyan), 0 0 18px rgba(0,204,255,.5); }
body[data-theme="neon"] .header h2{ text-shadow:0 0 10px var(--cyan), 2px 2px 0 var(--black); }
body[data-theme="neon"] .btn-pixel{ box-shadow:2px 2px 0 0 var(--black), 2px 2px 0 2px var(--cyan), 0 0 14px rgba(0,204,255,.6); }
body[data-theme="neon"] .btn-pixel.ghost{ box-shadow:2px 2px 0 0 var(--black), 2px 2px 0 2px var(--pink), 0 0 14px rgba(255,0,255,.6); }
body[data-theme="neon"] .game-card{ box-shadow:0 0 0 4px var(--cyan), 0 0 14px rgba(0,204,255,.4); }
body[data-theme="neon"] .back-btn{ box-shadow:0 0 0 4px var(--yellow), 0 0 12px rgba(255,170,0,.5); }
body[data-theme="neon"] .settings-group-title{ text-shadow:0 0 8px var(--yellow); }
body[data-theme="mono"]::before{
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.06) 0, transparent 40%),
    radial-gradient(circle at 80% 85%, rgba(255,255,255,.06) 0, transparent 40%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 1px, transparent 1px, transparent 3px);
}

/* モノクロテレビテーマ時、タイトル画面以外にCRT演出(走査線・ビネット・ロールバー)を重ねる */
#crt-overlay{ position:fixed; inset:0; pointer-events:none; z-index:6; display:none; }
body[data-theme="mono"]:not(.on-title) #crt-overlay{ display:block; }
#crt-overlay .crt-vignette{
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.6) 100%);
}
#crt-overlay .crt-scan{
  position:absolute; inset:0;
  background:repeating-linear-gradient(180deg, rgba(255,255,255,.1) 0px, rgba(255,255,255,.1) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:screen;
  animation: tv-flicker 4s infinite;
}
#crt-overlay .crt-roll{
  position:absolute; left:0; right:0; height:30%;
  background:linear-gradient(180deg, transparent, rgba(255,255,255,.16), transparent);
  animation: tv-roll 6s linear infinite;
}

/* ネオンテーマ */
body[data-theme="neon"]{
  --bg-0:#0a0e0a;
  --bg-1:#0f1410;
  --panel:#0f1410;
  --ink:#e0e0e0;
  --ink-dim:#6a6a6a;
  --pink:#ff00ff;
  --cyan:#00ccff;
  --yellow:#ffaa00;
  --black:#000000;
}
/* ネオンらしいグロー(光の滲み)を各パーツに追加 */
body[data-theme="neon"] .pixel-box{
  box-shadow: 0 0 0 var(--px) var(--cyan), 0 0 18px rgba(0,204,255,.4);
}
body[data-theme="neon"] .btn-pixel{
  box-shadow: 4px 4px 0 0 var(--black), 4px 4px 0 4px var(--cyan), 0 0 16px rgba(0,204,255,.5);
}
body[data-theme="neon"] .btn-pixel.ghost{
  box-shadow: 4px 4px 0 0 var(--black), 4px 4px 0 4px var(--pink), 0 0 16px rgba(255,0,255,.4);
}
body[data-theme="neon"] .header h2{
  text-shadow: 0 0 10px var(--cyan);
}
body[data-theme="neon"] .settings-group-title{
  text-shadow: 0 0 8px var(--yellow);
}
body[data-theme="neon"] .game-card .icon{
  box-shadow: 0 0 14px rgba(255,0,255,.45);
}
body[data-theme="neon"] .back-btn{
  box-shadow: 0 0 0 var(--px) var(--yellow), 0 0 14px rgba(255,170,0,.5);
}
body::before{
  content:"";
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,77,148,.10) 0, transparent 40%),
    radial-gradient(circle at 80% 85%, rgba(63,232,200,.10) 0, transparent 40%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 1px, transparent 1px, transparent 3px);
  pointer-events:none;
  z-index:0;
}
body::after{
  content:"";
  position:fixed; inset:0;
  background:repeating-linear-gradient(180deg, rgba(0,0,0,.25) 0, rgba(0,0,0,.25) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:multiply;
  pointer-events:none;
  z-index:5;
}
.screen{
  display:none;
  flex:1;
  flex-direction:column;
  min-height:100vh;
  padding:28px 18px 34px;
  position:relative;
  z-index:1;
}
.screen.active{ display:flex; }
.pixel-box{
  background:var(--panel);
  border:var(--px) solid var(--black);
  box-shadow: 0 0 0 var(--px) var(--cyan);
}
#screen-title{ justify-content:center; align-items:center; text-align:center;
  /* タイトル画面だけは常にこの配色に固定する(テーマ変更の影響を受けない・完全モノクロ) */
  --bg-0:#050505;
  --bg-1:#0f0f0f;
  --panel:#161616;
  --ink:#eceaea;
  --ink-dim:#7d7d7d;
  --pink:#dcdcdc;
  --cyan:#ffffff;
  --yellow:#bdbdbd;
  --black:#000000;
  background:var(--bg-0);
}
.title-plate{ padding:26px 18px 22px; max-width:340px; }
.title-eyebrow{ font-size:.62rem; letter-spacing:.3em; color:var(--yellow); margin-bottom:10px; }
.title-logo{ font-size:1.5rem; line-height:1.7; letter-spacing:.04em; text-shadow:2px 2px 0 var(--pink); }
.title-logo .accent{ color:var(--cyan); }

/* ===== 昔のモノクロテレビ風の筐体 ===== */
.tv-set{
  background:linear-gradient(180deg,#3a3a3a,#1c1c1c);
  border-radius:26px;
  padding:20px 20px 30px;
  max-width:300px;
  box-shadow:
    0 12px 0 0 #0a0a0a,
    inset 0 0 0 2px #4d4d4d;
  position:relative;
}
.tv-knobs{
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:10px;
}
.tv-knobs span{
  width:10px; height:10px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #888, #222);
  box-shadow:0 0 0 1px #000;
  display:block;
}
.tv-screen{
  background:#020202;
  border-radius:16px 16px 34px 34px / 16px 16px 46px 46px;
  padding:34px 22px;
  position:relative;
  overflow:hidden;
  color:var(--ink);
  transform-origin:center;
  animation: tv-poweron 12s ease-in-out infinite;
}
.tv-screen::before{
  content:"";
  position:absolute; inset:0;
  background:
    linear-gradient(115deg, transparent 38%, rgba(255,255,255,.07) 50%, transparent 62%),
    radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.88) 100%);
  pointer-events:none;
  z-index:3;
}
.tv-screen::after{
  content:"";
  position:absolute; inset:0;
  background:repeating-linear-gradient(180deg, rgba(255,255,255,.12) 0px, rgba(255,255,255,.12) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:3;
  animation: tv-flicker 4s infinite;
}
.tv-roll{
  position:absolute; left:0; right:0; height:35%;
  background:linear-gradient(180deg, transparent, rgba(255,255,255,.22), transparent);
  pointer-events:none;
  z-index:2;
  animation: tv-roll 6s linear infinite;
}
.tv-screen > *:not(.tv-roll){ position:relative; z-index:1; }
@keyframes tv-flicker{
  0%, 90%, 100%{ opacity:1; filter:brightness(1); }
  91%{ opacity:.5; filter:brightness(1.4); }
  92%{ opacity:1; filter:brightness(.9); }
  93%{ opacity:.7; filter:brightness(1.2); }
  94%{ opacity:1; filter:brightness(1); }
}
@keyframes tv-roll{
  0%{ top:-40%; }
  100%{ top:130%; }
}
@keyframes tv-poweron{
  0%, 92%, 100%{ transform:scaleY(1); filter:brightness(1); opacity:1; }
  93%{ transform:scaleY(.03); filter:brightness(4); opacity:.3; }
  94.5%{ transform:scaleY(1.05); filter:brightness(3); opacity:1; }
  96%{ transform:scaleY(.97); filter:brightness(1); }
  98%{ transform:scaleY(1); filter:brightness(1); opacity:1; }
}
.tv-foot{
  width:64px; height:10px;
  background:#1c1c1c;
  margin:10px auto 0;
  border-radius:0 0 6px 6px;
}
.press-start{ margin-top:26px; font-size:.85rem; letter-spacing:.1em; animation: blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
.title-actions{ margin-top:34px; display:flex; flex-direction:column; gap:16px; width:100%; max-width:200px; }
.btn-pixel{
  font-family:'DotGothic16','MS Gothic',monospace;
  font-size:.58rem; letter-spacing:.04em; color:var(--black);
  background:var(--yellow); border:none; padding:8px 10px; cursor:pointer;
  box-shadow: 2px 2px 0 0 var(--black), 2px 2px 0 2px var(--cyan);
  transition: transform .06s ease;
}
.btn-pixel.ghost{ background:var(--panel); color:var(--ink); box-shadow:2px 2px 0 0 var(--black), 2px 2px 0 2px var(--pink); }
.btn-pixel:active{ transform:translate(2px,2px); box-shadow:0 0 0 0 var(--black); }
.footnote{ margin-top:28px; font-size:.6rem; color:var(--ink-dim); letter-spacing:.08em; }
.header{ display:flex; align-items:center; gap:12px; margin-bottom:22px; }
.back-btn{
  width:42px; height:42px; background:var(--panel); border:var(--px) solid var(--black);
  box-shadow:0 0 0 var(--px) var(--yellow); color:var(--ink); font-size:1rem;
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
}
.back-btn:active{ transform:translate(2px,2px); }
.header h2{ font-size:.9rem; letter-spacing:.08em; margin:0; text-shadow:2px 2px 0 var(--black); }
.game-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.game-card{ padding:16px 10px 14px; display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; text-align:center; }
.game-card.locked{ opacity:.45; cursor:default; }
.game-card .icon{ width:52px; height:52px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; background:var(--bg-1); border:var(--px) solid var(--black); }
.game-card .name{ font-size:.72rem; letter-spacing:.03em; line-height:1.5; }
.game-card .tag{ font-size:.58rem; color:var(--cyan); }
.game-card.locked .tag{ color:var(--ink-dim); }
.settings-group{ margin-bottom:20px; padding:4px 0 8px; }
.settings-group-title{ font-size:.62rem; color:var(--yellow); letter-spacing:.1em; padding:10px 14px 12px; }
.settings-row{ display:flex; align-items:center; justify-content:space-between; padding:14px; border-top:2px solid rgba(255,255,255,.08); }
.settings-row:first-of-type{ border-top:none; }
.settings-row .label{ font-size:.75rem; letter-spacing:.03em; }
.settings-row .desc{ font-size:.6rem; color:var(--ink-dim); margin-top:4px; }
.switch-px{ position:relative; width:52px; height:26px; flex-shrink:0; cursor:pointer; }
.switch-px input{ display:none; }
.switch-px .track{ position:absolute; inset:0; background:var(--bg-0); border:2px solid var(--black); box-shadow:0 0 0 2px var(--ink-dim); }
.switch-px .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; background:var(--pink); }
.switch-px input:checked + .track{ box-shadow:0 0 0 2px var(--cyan); }
.switch-px input:checked + .track .knob{ left:auto; right:2px; background:var(--cyan); }
input[type=range].range-px{ -webkit-appearance:none; width:120px; height:10px; background:var(--bg-0); border:2px solid var(--black); outline:none; }
input[type=range].range-px::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:16px; background:var(--yellow); border:2px solid var(--black); cursor:pointer; }
.select-px{ font-family:'DotGothic16','MS Gothic',monospace; background:var(--bg-0); color:var(--ink); border:2px solid var(--black); box-shadow:0 0 0 2px var(--ink-dim); padding:8px 10px; font-size:.7rem; }
.danger-row .label{ color:var(--pink); }
</style>
</head>
<body class="on-title">

  <section id="screen-title" class="screen active">
    <div class="tv-set">
      <div class="tv-knobs"><span></span><span></span></div>
      <div class="tv-screen">
        <div class="tv-roll"></div>
        <div class="title-eyebrow">CHALLENGE ACCEPTED?</div>
        <div class="title-logo">美容室<span class="accent">CLan</span><br>からの<br>挑戦状</div>
      </div>
      <div class="tv-foot"></div>
    </div>
    <div class="press-start">▼ PRESS START</div>
    <div class="title-actions">
      <button class="btn-pixel" onclick="showScreen('select')">▶ ゲームをえらぶ</button>
      <button class="btn-pixel ghost" onclick="showScreen('settings')">⚙ せってい</button>
    </div>
    <div class="footnote">v0.1 — もっとゲームが増える予定です</div>
  </section>

  <section id="screen-select" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('title')">←</button>
      <h2>ゲームをえらぶ</h2>
    </div>
    <div class="game-grid" id="game-grid"></div>
  </section>

  <section id="screen-settings" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('title')">←</button>
      <h2>せってい</h2>
    </div>
    <div class="settings-group pixel-box">
      <div class="settings-group-title">サウンド</div>
      <div class="settings-row">
        <div><div class="label">効果音</div><div class="desc">タップ音などを鳴らす</div></div>
        <label class="switch-px">
          <input type="checkbox" id="setting-sound" checked onchange="saveSettings()">
          <span class="track"><span class="knob"></span></span>
        </label>
      </div>
      <div class="settings-row">
        <div class="label">音量</div>
        <input type="range" class="range-px" id="setting-volume" min="0" max="100" value="70" oninput="saveSettings()">
      </div>
    </div>
    <div class="settings-group pixel-box">
      <div class="settings-group-title">表示</div>
      <div class="settings-row">
        <div class="label">テーマ</div>
        <select class="select-px" id="setting-theme" onchange="saveSettings()">
          <option value="dark">ダーク</option>
          <option value="light">ライト</option>
          <option value="mono">モノクロテレビ</option>
          <option value="neon">ネオン</option>
        </select>
      </div>
    </div>
    <div class="settings-group pixel-box">
      <div class="settings-group-title">データ</div>
      <div class="settings-row danger-row" style="cursor:pointer;" onclick="resetAllData()">
        <div><div class="label">全ゲームのセーブデータを削除</div><div class="desc">この操作は取り消せません</div></div>
        <span>›</span>
      </div>
    </div>
  </section>

  <div id="crt-overlay">
    <div class="crt-vignette"></div>
    <div class="crt-scan"></div>
    <div class="crt-roll"></div>
  </div>

<script>
  // ゲーム一覧(できたゲームから順にlocked:falseにしてurlを設定していく)
  const GAMES = [
    { id:"sudoku",     name:"モダン・ナンプレ", icon:"🔢", tag:"PUZZLE", url:"sudoku.html", locked:false },
    { id:"maze",       name:"迷路ゲーム",       icon:"🌀", tag:"準備中", url:null, locked:true },
    { id:"picross",    name:"イラストロジック", icon:"🧩", tag:"準備中", url:null, locked:true },
  ];

  function showScreen(name){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.body.classList.toggle('on-title', name === 'title');
  }

  function renderGameGrid(){
    const grid = document.getElementById('game-grid');
    grid.innerHTML = "";
    GAMES.forEach(g => {
      const card = document.createElement('div');
      card.className = 'game-card pixel-box' + (g.locked ? ' locked' : '');
      card.innerHTML = `<div class="icon">${g.icon}</div><div class="name">${g.name}</div><div class="tag">${g.tag}</div>`;
      if(!g.locked){ card.onclick = () => { location.href = g.url; }; }
      grid.appendChild(card);
    });
  }

  function applyTheme(theme){
    document.body.dataset.theme = theme;
  }

  const SETTINGS_KEY = "clanhair.settings";
  function saveSettings(){
    const theme = document.getElementById('setting-theme').value;
    applyTheme(theme);
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      sound: document.getElementById('setting-sound').checked,
      volume: document.getElementById('setting-volume').value,
      theme: theme,
    }));
  }
  function loadSettings(){
    const raw = localStorage.getItem(SETTINGS_KEY);
    const s = raw ? JSON.parse(raw) : {};
    try{
      document.getElementById('setting-sound').checked = s.sound ?? true;
      document.getElementById('setting-volume').value = s.volume ?? 70;
      document.getElementById('setting-theme').value = s.theme ?? 'dark';
      applyTheme(s.theme ?? 'dark');
    }catch(e){}
  }
  function resetAllData(){
    if(confirm("すべてのゲームのセーブデータと設定を削除します。よろしいですか？")){
      localStorage.clear(); loadSettings(); alert("削除しました。");
    }
  }

  renderGameGrid();
  loadSettings();
</script>
</body>
</html>
